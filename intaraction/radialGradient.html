<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>radialGradient</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
        <style>
            .headerBar {
                position: relative;
                background: #0b1e3a;
                overflow: hidden;
            }

            .headerBar::before {
                content: "";
                position: absolute;
                inset: -20%;
                background:
                    radial-gradient(circle at 30% 40%, #212529 0%, transparent 60%),
                    radial-gradient(circle at 70% 60%, #234 0%, transparent 80%),
                    radial-gradient(circle at 50% 80%, #6a747c 0%, transparent 30%);
                animation: fluidMove 12s ease-in-out infinite alternate;
                filter: blur(40px) contrast(140%);
                opacity: 0.8;
            }

            @keyframes fluidMove {
                0% {
                    transform: translate(0%, 0%) scale(1);
                }
                50% {
                    transform: translate(-5%, 3%) scale(3);
                }
                100% {
                    transform: translate(40%, -4%) scale(1.05);
                }
            }

            .shine {
                background: linear-gradient(
                    to right,
                    rgba(255, 255, 255, 0) 0%,
                    rgba(255, 255, 255, 0.5) 50%,
                    rgba(255, 255, 255, 0) 100%
                );
                background-size: 75% 100%;
                animation: headerShine 5s ease-out infinite;
                background-repeat: no-repeat;
                background-position: -300% 0;
                background-color: #234;
                background-blend-mode: overlay;
            }

            @keyframes headerShine {
                /* 光が走る区間（約0.8秒 = 8秒の10%） */
                0% {
                    background-position: -300% 0;
                }
                10% {
                    background-position: 800% 0;
                }

                /* 残りは停止 */
                100% {
                    background-position: 800% 0;
                }
            }
        </style>
    </head>
    <body>
        <div class="p-2 shine headerBar">
            <div class="container d-flex justify-content-between">
                <div class="navbar-brand text-white fs-5 fw-bold">logo</div>
                <button class="btn btn-outline-secondary">ログイン</button>
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
