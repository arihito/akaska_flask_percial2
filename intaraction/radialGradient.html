<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>radialGradient</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
        <style>
            .headerBar {
                filter: grayscale(30%);
                animation: headerBarRadial 5s ease-in-out infinite;
            }

            @keyframes headerBarRadial {
                0% {
                    background:
                    radial-gradient(ellipse at 50% 8%,    rgb(12,  38,  78), transparent),
                    radial-gradient(ellipse at 48% 52%,   rgb(18,  10,  58), transparent),
                    radial-gradient(ellipse at 12% 55%,   rgb(5,   23,  36), rgba(10, 13, 68, 1) 100%),
                    radial-gradient(ellipse at 50% 92%,   rgb(46, 81, 117), transparent);
                }

                25% {
                    background:
                    radial-gradient(ellipse at 52% 12%,   rgb(10,  35,  74), transparent),
                    radial-gradient(ellipse at 45% 48%,   rgb(11,   5,  54), transparent),
                    radial-gradient(ellipse at 18% 60%,   rgb(19, 48, 99), rgba(6,  10, 62, 1) 100%),
                    radial-gradient(ellipse at 48% 88%,   rgb(14,  35,  54), transparent);
                    mix-blend-mode: multiply;
                }

                50% {
                    background:
                    radial-gradient(ellipse at 48% 10%,   rgb(15,  40,  68), transparent),
                    radial-gradient(ellipse at 55% 55%,   rgb(16,   9,  48), transparent),
                    radial-gradient(ellipse at 8%  52%,   rgb(51, 72, 109), rgba(11, 14, 55, 1) 100%),
                    radial-gradient(ellipse at 52% 95%,   rgb(19,  44,  62), transparent);
                }

                75% {
                    background:
                    radial-gradient(ellipse at 54% 6%,    rgb(8,   32,  82), transparent),
                    radial-gradient(ellipse at 42% 58%,   rgb(40, 24, 117), transparent),
                    radial-gradient(ellipse at 22% 48%,   rgb(10,  24,  30), rgb(8, 10, 128) 100%),
                    radial-gradient(ellipse at 46% 90%,   rgb(16,  36,  68), transparent);
                }

                100% {
                    background:
                    radial-gradient(ellipse at 50% 9%,    rgb(13,  41,  70), transparent),
                    radial-gradient(ellipse at 53% 50%,   rgb(15,   6,  56), transparent),
                    radial-gradient(ellipse at 10% 57%,   rgb(6,   19,  40), rgba(9,  12, 60, 1) 100%),
                    radial-gradient(ellipse at 51% 93%,   rgb(60, 77, 97), transparent);
                }
            }
        </style>
    </head>
    <body>
        <div class="headerBar p-2">
            <div class="container d-flex justify-content-between">
                <div class="navbar-brand text-white fs-5 fw-bold">logo</div>
                <button class="btn btn-outline-secondary">ログイン</button>
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
